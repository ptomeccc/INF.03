<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <link rel="stylesheet" href="styl.css" />
  </head>
  <body>
    <main>
      <header><h2>Chat</h2></header>
      <div class="chat" id="chat">
        <div id="jolanta" class="wypowiedz">
          <img src="Jolka.jpg" />
          <p>Cześć idziesz jutro do kina?</p>
        </div>
        <div id="krzysiek" class="wypowiedz">
          <img src="Krzysiek.jpg" />
          <p>Tak! A ty?</p>
        </div>
      </div>
      Wpisz wiadomość:
      <input type="text" name="wiadomosc" id="wiadomosc" />
      <button onclick="getLastMessage()">Wyślij</button><br />
      <button onclick="generateRandom()">Generuj losową odpowiedź</button>
    </main>

    <aside>
      <h3>Chaty</h3>
      <ul>
        <li>Ogólny</li>
        <li>
          Tematyczne
          <ol>
            <li>Turystyczny</li>
            <li>Żeglarski</li>
            <li>Filatelistyczny</li>
            <li>Hodowla zwierzątek domowych</li>
          </ol>
        </li>
      </ul>
      <h3>Uczestnicy</h3>
      <p>Jolanta Nowak</p>
      <img src="Jolka.jpg" alt="Jolanta Nowak" />
      <p>Krzysztof Łukasiński</p>
      <img src="Krzysiek.jpg" alt="Krzysztof Łukasiński" />
    </aside>

    <footer><h5>Chat wykonał: 00000000000</h5></footer>
    <script src="script.js"></script>
  </body>
</html>
